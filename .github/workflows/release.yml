name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Package onedir as zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\ToonTownMultiTool\*" -DestinationPath "ToonTownMultiTool-$tag-Windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ToonTownMultiTool-*.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xdotool libxcb-xinerama0 libxcb-cursor0 libxcb-record0 libxcb-xtest0 libxcb-icccm4-dev libxcb-xkb-dev libxcb-shape0-dev libxcb-keysyms1-dev libxkbcommon-x11-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/ToonTownMultiTool AppDir/usr/bin/ToonTownMultiTool
          chmod +x AppDir/usr/bin/ToonTownMultiTool

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir \
            TTMultiTool-${{ github.ref_name }}-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: TTMultiTool-*.AppImage

  build-flatpak:
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: TTMultiTool-${{ github.ref_name }}-Linux-x86_64.flatpak
          manifest-path: flatpak/io.github.flossbud.ToonTownMultiTool.yml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/*.yml') }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: TTMultiTool-*.flatpak

  release:
    needs: [build-windows, build-linux, build-flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4

      - name: Render SMOKETEST.md (beta tags only)
        if: contains(github.ref_name, '-')
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          SHA=$(git rev-parse --short "${{ github.sha }}")
          BUILT=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "# Smoketest — ToonTown MultiTool ${{ github.ref_name }}"
            echo
            echo "Built:    $BUILT"
            echo "Commit:   $SHA"
            echo "Tag:      ${{ github.ref_name }}"
            [ -n "$PREV" ] && echo "Previous: $PREV"
            echo
            echo "## Manual checklist"
            echo
            cat docs/smoketest-checklist.md
            echo
            if [ -n "$PREV" ]; then
              echo "## Changes since $PREV"
              echo
              git log "$PREV..${{ github.ref_name }}" --pretty=format:'- %h  %s'
              echo
            fi
            echo
            echo "## Outcome"
            echo
            echo "- [ ] All checklist items pass"
            echo "- [ ] No regressions noticed"
            echo "- [ ] OK to promote to public via /release"
          } > SMOKETEST.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ToonTown MultiTool ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            windows-zip/ToonTownMultiTool-*.zip
            linux-appimage/TTMultiTool-*.AppImage
            linux-flatpak/TTMultiTool-*.flatpak
            SMOKETEST.md
