name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    uses: ./.github/workflows/build.yml
    # include_windows defaults to true — release ships the Windows EXE

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4

      - name: Render SMOKETEST.md (beta tags only)
        if: contains(github.ref_name, '-')
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          SHA=$(git rev-parse --short "${{ github.sha }}")
          BUILT=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "# Smoketest — ToonTown MultiTool ${{ github.ref_name }}"
            echo
            echo "Built:    $BUILT"
            echo "Commit:   $SHA"
            echo "Tag:      ${{ github.ref_name }}"
            [ -n "$PREV" ] && echo "Previous: $PREV"
            echo
            echo "## Manual checklist"
            echo
            cat docs/smoketest-checklist.md
            echo
            if [ -n "$PREV" ]; then
              echo "## Changes since $PREV"
              echo
              git log "$PREV..${{ github.ref_name }}" --pretty=format:'- %h  %s'
              echo
            fi
            echo
            echo "## Outcome"
            echo
            echo "- [ ] All checklist items pass"
            echo "- [ ] No regressions noticed"
            echo "- [ ] OK to promote to public via /release"
          } > SMOKETEST.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ToonTown MultiTool ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            windows-zip/ToonTownMultiTool-*.zip
            linux-appimage/TTMultiTool-*.AppImage
            linux-flatpak/TTMultiTool-*.flatpak
            SMOKETEST.md
