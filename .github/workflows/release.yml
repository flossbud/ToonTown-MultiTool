name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      version_label: ${{ github.ref_name }}
      include_flatpak: true

  test-linux:
    needs: build-linux
    uses: ./.github/workflows/test-linux.yml
    with:
      include_flatpak: true
      include_aur: true

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    with:
      version_label: ${{ github.ref_name }}

  test-windows:
    needs: build-windows
    uses: ./.github/workflows/test-windows.yml

  publish:
    needs: [test-linux, test-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4

      - name: Determine release channel
        id: channel
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD 2>/dev/null; then
            echo "public=true" >> "$GITHUB_OUTPUT"
            echo "Channel: public (tag reachable from origin/main) -> Latest"
          else
            echo "public=false" >> "$GITHUB_OUTPUT"
            echo "Channel: beta (tag not on origin/main) -> prerelease"
          fi

      - name: Render SMOKETEST.md (beta tags only)
        if: contains(github.ref_name, '-')
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          SHA=$(git rev-parse --short "${{ github.sha }}")
          BUILT=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "# Smoketest — ToonTown MultiTool ${{ github.ref_name }}"
            echo
            echo "Built:    $BUILT"
            echo "Commit:   $SHA"
            echo "Tag:      ${{ github.ref_name }}"
            [ -n "$PREV" ] && echo "Previous: $PREV"
            echo
            echo "## Manual checklist"
            echo
            cat docs/smoketest-checklist.md
            echo
            if [ -n "$PREV" ]; then
              echo "## Changes since $PREV"
              echo
              git log "$PREV..${{ github.ref_name }}" --pretty=format:'- %h  %s'
              echo
            fi
            echo
            echo "## Outcome"
            echo
            echo "- [ ] All checklist items pass"
            echo "- [ ] No regressions noticed"
            echo "- [ ] OK to promote to public via /release"
          } > SMOKETEST.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: ToonTown MultiTool ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.channel.outputs.public != 'true' }}
          files: |
            windows-zip/ToonTownMultiTool-*.zip
            windows-installer/ToonTownMultiTool-Setup-*.exe
            linux-appimage/TTMultiTool-*.AppImage
            linux-flatpak/TTMultiTool-*.flatpak
            linux-deb/TTMultiTool-*.deb
            SMOKETEST.md

      - name: Demote prior Latest
        if: steps.channel.outputs.public == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRIOR=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq "[.[] | select(.prerelease==false) | select(.tag_name != \"${GITHUB_REF_NAME}\")] | sort_by(.created_at) | last | .tag_name // empty")
          if [ -n "$PRIOR" ]; then
            gh release edit "$PRIOR" --prerelease --repo "$GITHUB_REPOSITORY"
            echo "Demoted prior Latest: $PRIOR"
          else
            echo "No prior Latest to demote."
          fi
