name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Channel = stable (/release: tag reachable from origin/main) vs beta
  # (/pre-release: dev-only tag). Single source of truth for BOTH the build
  # flavor (Windows installer name/appid/.beta_flavor) and the publish
  # prerelease state, so they can never disagree. Do NOT infer the channel from
  # a version hyphen: every pre-1.0 alpha version is hyphenated regardless of
  # channel, so the hyphen would wrongly beta-flavor stable alpha releases.
  channel:
    runs-on: ubuntu-latest
    outputs:
      beta: ${{ steps.detect.outputs.beta }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Determine release channel
        id: detect
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD 2>/dev/null; then
            echo "beta=false" >> "$GITHUB_OUTPUT"
            echo "Channel: stable (tag reachable from origin/main) -> Latest"
          else
            echo "beta=true" >> "$GITHUB_OUTPUT"
            echo "Channel: beta (tag not on origin/main) -> prerelease"
          fi

  build-linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      version_label: ${{ github.ref_name }}
      include_flatpak: true

  test-linux:
    needs: build-linux
    uses: ./.github/workflows/test-linux.yml
    with:
      include_flatpak: true
      include_aur: true

  build-windows:
    needs: channel
    uses: ./.github/workflows/build-windows.yml
    with:
      version_label: ${{ github.ref_name }}
      beta: ${{ needs.channel.outputs.beta == 'true' }}

  test-windows:
    needs: build-windows
    uses: ./.github/workflows/test-windows.yml

  build-macos:
    needs: channel
    uses: ./.github/workflows/build-macos.yml
    with:
      version_label: ${{ github.ref_name }}
      beta: ${{ needs.channel.outputs.beta == 'true' }}

  test-macos:
    needs: build-macos
    uses: ./.github/workflows/test-macos.yml

  publish:
    needs: [channel, test-linux, test-windows, test-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v8

      - name: Render SMOKETEST.md (beta channel only)
        # Gate on the resolved CHANNEL, not a version hyphen: every pre-1.0
        # alpha tag is hyphenated regardless of channel, so a hyphen check
        # would wrongly attach SMOKETEST.md to stable /release alphas. Smoke
        # tests are a /pre-release (beta) artifact only.
        if: needs.channel.outputs.beta == 'true'
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          SHA=$(git rev-parse --short "${{ github.sha }}")
          BUILT=$(date -u +"%Y-%m-%d %H:%M UTC")
          {
            echo "# Smoketest — ToonTown MultiTool ${{ github.ref_name }}"
            echo
            echo "Built:    $BUILT"
            echo "Commit:   $SHA"
            echo "Tag:      ${{ github.ref_name }}"
            [ -n "$PREV" ] && echo "Previous: $PREV"
            echo
            echo "## Manual checklist"
            echo
            cat docs/smoketest-checklist.md
            echo
            if [ -n "$PREV" ]; then
              echo "## Changes since $PREV"
              echo
              git log "$PREV..${{ github.ref_name }}" --pretty=format:'- %h  %s'
              echo
            fi
            echo
            echo "## Outcome"
            echo
            echo "- [ ] All checklist items pass"
            echo "- [ ] No regressions noticed"
            echo "- [ ] OK to promote to public via /release"
          } > SMOKETEST.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: ToonTown MultiTool ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ needs.channel.outputs.beta == 'true' }}
          files: |
            windows-zip/ToonTownMultiTool-Portable-*.zip
            windows-installer/ToonTownMultiTool-Setup-*.exe
            linux-appimage/ToonTownMultiTool-*.AppImage
            linux-flatpak/ToonTownMultiTool-*.flatpak
            linux-deb/ToonTownMultiTool-*.deb
            macos-dmg/ToonTownMultiTool-*.dmg
            SMOKETEST.md

      - name: Demote prior Latest
        if: needs.channel.outputs.beta != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRIOR=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq "[.[] | select(.prerelease==false) | select(.tag_name != \"${GITHUB_REF_NAME}\")] | sort_by(.created_at) | last | .tag_name // empty")
          if [ -n "$PRIOR" ]; then
            gh release edit "$PRIOR" --prerelease --repo "$GITHUB_REPOSITORY"
            echo "Demoted prior Latest: $PRIOR"
          else
            echo "No prior Latest to demote."
          fi

      # The README's three platform cards link straight at the newest stable
      # binaries. GitHub only serves an always-latest asset URL when the
      # filename never changes, and ours carry the version -- so resolve the
      # names here, at publish time, and write them into the README instead of
      # duplicating every asset under a fixed alias.
      #
      # Gate on the resolved CHANNEL, never a version hyphen: every pre-1.0
      # alpha tag is hyphenated regardless of channel, so a hyphen check would
      # let a beta overwrite the stable download links.
      #
      # Both main and dev are updated in the same step. The commits carry
      # [skip ci], which suppresses every workflow for that push -- including
      # sync-docs-to-dev -- so dev cannot be left behind main.
      #
      # If this step ever fails, the links keep pointing at the previous
      # release's real assets: stale by one version, never broken.
      - name: Point README download links at this release
        if: needs.channel.outputs.beta != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          names=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          pick() { printf '%s\n' "$names" | grep -iE "$1" | head -1; }
          appimage=$(pick '\.AppImage$' || true)
          dmg=$(pick '\.dmg$' || true)
          exe=$(pick '\.exe$' || true)
          for pair in "AppImage:$appimage" "dmg:$dmg" "exe:$exe"; do
            if [ -z "${pair#*:}" ]; then
              echo "::error::No ${pair%%:*} asset on $TAG; refusing to write a broken link."
              exit 1
            fi
          done
          echo "Resolved: $appimage | $dmg | $exe"

          cat > /tmp/relink.py <<'PY'
          import pathlib, re, sys
          base, app, dmg, exe = sys.argv[1:5]
          readme = pathlib.Path("README.md")
          text = readme.read_text()

          # A branch whose README predates the download cards has nothing to
          # rewrite. Skip it rather than failing the release: exit 3 is "no
          # links here", distinct from a real error.
          if not re.search(r'https://github\.com/[^"]+/releases/download/', text):
              sys.exit(3)

          for ext, name in ((r"\.AppImage", app), (r"\.dmg", dmg), (r"\.exe", exe)):
              pattern = rf'https://github\.com/[^"]+/releases/download/[^"]+{ext}'
              text, n = re.subn(pattern, f"{base}/{name}", text)
              if n != 1:
                  sys.exit(f"expected exactly 1 {ext} link, rewrote {n}")
          readme.write_text(text)
          PY

          base="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for branch in main dev; do
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"
            rc=0
            python3 /tmp/relink.py "$base" "$appimage" "$dmg" "$exe" || rc=$?
            if [ "$rc" -eq 3 ]; then
              echo "::notice::$branch has no download links to rewrite; skipping."
              continue
            elif [ "$rc" -ne 0 ]; then
              echo "::error::$branch: refusing to write a broken link."
              exit 1
            fi
            if git diff --quiet -- README.md; then
              echo "$branch: links already current"
              continue
            fi
            git add README.md
            git commit -m "docs: point download links at $TAG [skip ci]"
            git push origin "$branch"
            echo "$branch: links updated"
          done
