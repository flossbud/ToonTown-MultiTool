name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Rename EXE with version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item "dist\ToonTownMultiTool.exe" "ToonTownMultiTool-$tag-Windows-x86_64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ToonTownMultiTool-*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xdotool libxcb-xinerama0 libxcb-cursor0

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Prepare AppDir
        run: |
          cp dist/ToonTownMultiTool AppDir/usr/bin/ToonTownMultiTool
          chmod +x AppDir/usr/bin/ToonTownMultiTool

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir \
            TTMultiTool-${{ github.ref_name }}-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: TTMultiTool-*.AppImage

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ToonTown MultiTool ${{ github.ref_name }}
          files: |
            windows-exe/ToonTownMultiTool-*.exe
            linux-appimage/TTMultiTool-*.AppImage
