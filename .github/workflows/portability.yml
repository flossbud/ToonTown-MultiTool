name: Portability Matrix

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  # Reuse the Linux AppImage + Flatpak builds from release.yml so the matrix
  # tests the exact artifacts users download.
  build:
    uses: ./.github/workflows/release.yml

  source-matrix:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Phase 1: discovery — every cell may fail independently.
    # Phase 3 flips this to false so red blocks merges.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system + Qt runtime dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y python3 python3-pip xvfb \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 libegl1 libgl1 libdbus-1-3

      - name: Install Python dependencies
        run: python3 -m pip install --break-system-packages -r requirements.txt

      - name: Run self-check under xvfb (real xcb platform)
        run: xvfb-run -a python3 main.py --self-check

  appimage-matrix:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    steps:
      # No checkout: the AppImage artifact is self-contained — nothing from the repo is needed.
      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Install xvfb only (AppImage must be otherwise self-contained)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y xvfb

      - name: Run self-check via AppImage (extract-and-run, no libfuse2)
        run: |
          chmod +x TTMultiTool-*.AppImage
          xvfb-run -a ./TTMultiTool-*.AppImage --appimage-extract-and-run --self-check

      - name: Run self-check via AppImage (with libfuse2 if available)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y libfuse2 || apt-get install -y libfuse2t64 || true
          xvfb-run -a ./TTMultiTool-*.AppImage --self-check

  flatpak-check:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-flatpak

      - name: Install flatpak runtime + bundle
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak xvfb
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.7 || true
          flatpak install --user -y --bundle TTMultiTool-*.flatpak

      - name: Run self-check via Flatpak
        run: |
          xvfb-run -a flatpak run io.github.flossbud.ToonTownMultiTool --self-check
