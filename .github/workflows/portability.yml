name: Portability Matrix

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  # Reuse the Linux AppImage + Flatpak builds from build.yml so the matrix
  # tests the exact artifacts users download.
  build:
    uses: ./.github/workflows/build.yml
    with:
      include_windows: false

  source-matrix:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Phase 1: discovery — every cell may fail independently.
    # Phase 3 flips this to false so red blocks merges.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system + Qt runtime dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y python3 python3-pip python3-venv xvfb \
            libglib2.0-0 libgl1 libegl1 libdbus-1-3 libfontconfig1 libfreetype6 \
            libx11-6 libx11-xcb1 libxext6 libxrender1 libxi6 libsm6 libice6 \
            libxcb1 libxcb-cursor0 libxcb-glx0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-render0 \
            libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 libxkbcommon-x11-0

      - name: Create venv and install Python dependencies
        run: |
          python3 -m venv /tmp/ttmt-venv
          /tmp/ttmt-venv/bin/pip install --upgrade pip
          /tmp/ttmt-venv/bin/pip install -r requirements.txt

      - name: Run self-check under xvfb (real xcb platform)
        run: xvfb-run -a /tmp/ttmt-venv/bin/python main.py --self-check

  appimage-matrix:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    steps:
      # No checkout: the AppImage artifact is self-contained — nothing from the repo is needed.
      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Install xvfb + host Qt runtime libraries
        # The AppImage bundles Python + PySide6 + the app, but — like every
        # Linux GUI app — relies on the host for the GL/xcb runtime stack
        # (PyInstaller and the AppImage excludelist both intentionally leave
        # libEGL/libGL to the host). Every real Mint/Debian/Ubuntu desktop has
        # these; a bare container does not, so the test must install them.
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y xvfb \
            libglib2.0-0 libgl1 libegl1 libdbus-1-3 libfontconfig1 libfreetype6 \
            libx11-6 libx11-xcb1 libxext6 libxrender1 libxi6 libsm6 libice6 \
            libxcb1 libxcb-cursor0 libxcb-glx0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-render0 \
            libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 libxkbcommon-x11-0

      - name: Run self-check via AppImage (extract-and-run, no libfuse2)
        run: |
          chmod +x TTMultiTool-*.AppImage
          xvfb-run -a ./TTMultiTool-*.AppImage --appimage-extract-and-run --self-check

      - name: Run self-check via AppImage (with libfuse2 if available)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y libfuse2 || apt-get install -y libfuse2t64 || true
          xvfb-run -a ./TTMultiTool-*.AppImage --self-check

  flatpak-check:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-flatpak

      - name: Install flatpak runtime + bundle
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak xvfb
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.7 || true
          flatpak install --user -y --bundle TTMultiTool-*.flatpak

      - name: Run self-check via Flatpak
        run: |
          xvfb-run -a flatpak run io.github.flossbud.ToonTownMultiTool --self-check
