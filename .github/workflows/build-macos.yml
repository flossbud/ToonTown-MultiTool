name: Build macOS

on:
  workflow_call:
    inputs:
      version_label:
        description: Label embedded in artifact filenames (e.g. a release tag). Must not contain '/'.
        type: string
        default: dev
      beta:
        description: >-
          Build the beta-channel flavor (name "ToonTown MultiTool Beta", beta
          bundle id, .beta_flavor sentinel). The caller decides this from the
          release CHANNEL (tag reachable from main = stable), NOT the version
          string. Stable when false.
        type: boolean
        default: false

jobs:
  # One single-arch .app per runner. macos-13 is Intel (x86_64), macos-14 is
  # Apple Silicon (arm64); both pinned during the Task 3 bring-up. The two
  # trees are fused into one universal2 .app in merge-sign-dmg.
  build-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-13, arch: x86_64 }   # Intel (pinned, Task 3)
          - { runner: macos-14, arch: arm64 }    # Apple Silicon (pinned, Task 3)
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assert runner architecture
        run: |
          got="$(uname -m)"
          [ "$got" = "${{ matrix.arch }}" ] || { echo "expected ${{ matrix.arch }}, runner is $got" >&2; exit 1; }

      - name: Source pinned build env
        run: |
          source packaging/macos/build_env.sh
          echo "TTMT_LSMINVER=$TTMT_LSMINVER" >> "$GITHUB_ENV"
          echo "BUILD_PY=$BUILD_PY" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.BUILD_PY }}   # single source of truth: build_env.sh (Task 3)

      - name: Write build info
        id: buildinfo
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          cat > utils/_build_info.py <<EOF
          BUILD_NUMBER = $BUILD_NUMBER
          BUILD_SHA = "$(git rev-parse --short HEAD)"
          BUILD_DATE = "$(date -u +%Y%m%d)"
          EOF
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app
        env:
          TTMT_VERSION: ${{ inputs.version_label }}
          TTMT_BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          TTMT_BETA: ${{ inputs.beta && '1' || '' }}
        run: pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Pack .app for transport
        # upload-artifact resolves symlinks and drops the +x bit; a raw .app
        # upload would arrive with a broken Python.framework and a
        # non-executable launcher. ditto's zip preserves symlinks, perms, and
        # bundle metadata so the merge job gets a faithful tree.
        run: |
          APP_NAME="$(basename "$(ls -d dist/*.app)")"
          ditto -c -k --keepParent "dist/$APP_NAME" "macos-app-${{ matrix.arch }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-app-${{ matrix.arch }}
          path: macos-app-${{ matrix.arch }}.zip

  merge-sign-dmg:
    needs: build-arch
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: macos-app-arm64
          path: arm64-in
      - uses: actions/download-artifact@v8
        with:
          name: macos-app-x86_64
          path: x86_64-in

      - name: Unpack both single-arch .app trees
        run: |
          mkdir -p arm64 x86_64
          ditto -x -k arm64-in/macos-app-arm64.zip arm64
          ditto -x -k x86_64-in/macos-app-x86_64.zip x86_64

      - name: Merge to universal2 (mutate bundle BEFORE signing)
        run: |
          APP_NAME="$(basename "$(ls -d arm64/*.app)")"
          mkdir -p dist
          bash packaging/macos/lipo_merge.sh "arm64/$APP_NAME" "x86_64/$APP_NAME" "dist/$APP_NAME"
          # Every bundle mutation MUST happen here, BEFORE signing. The beta
          # sentinel sits next to the executable so build_flavor finds it next
          # to sys.executable in the packaged app at runtime.
          if [ "${{ inputs.beta }}" = "true" ]; then
            touch "dist/$APP_NAME/Contents/MacOS/.beta_flavor"
          fi

      - name: Verify universal (fat-Mach-O gate)
        run: bash packaging/macos/verify_universal.sh "dist/$(basename "$(ls -d dist/*.app)")"

      - name: Sign (ad-hoc hardened runtime)
        run: bash packaging/macos/sign.sh "dist/$(basename "$(ls -d dist/*.app)")"

      - name: Build DMG
        run: |
          APP="dist/$(basename "$(ls -d dist/*.app)")"
          if [ "${{ inputs.beta }}" = "true" ]; then
            VOL="ToonTown MultiTool Beta"
            OUT="ToonTownMultiTool-Beta-${{ inputs.version_label }}.dmg"
          else
            VOL="ToonTown MultiTool"
            OUT="ToonTownMultiTool-${{ inputs.version_label }}.dmg"
          fi
          bash packaging/macos/build_dmg.sh "$APP" "$OUT" "$VOL"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: ToonTownMultiTool-*.dmg
