name: Build macOS

on:
  workflow_call:
    inputs:
      version_label:
        description: Label embedded in artifact filenames (e.g. a release tag). Must not contain '/'.
        type: string
        default: dev
      beta:
        description: >-
          Build the beta-channel flavor (name "ToonTown MultiTool Beta", beta
          bundle id, .beta_flavor sentinel). The caller decides this from the
          release CHANNEL (tag reachable from main = stable), NOT the version
          string. Stable when false.
        type: boolean
        default: false

jobs:
  # One Apple-Silicon runner builds BOTH slices of the universal2 .app: the
  # x86_64 slice under Rosetta 2, the arm64 slice natively, then lipo-merges
  # them. GitHub no longer reliably serves Intel (macos-13) runners, so the
  # old two-runner matrix would queue forever. Both slices use the same
  # python-build-standalone interpreter (build_env.sh) so the trees are
  # structurally identical before lipo.
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Source pinned build env
        run: |
          source packaging/macos/build_env.sh
          {
            echo "PBS_RELEASE=$PBS_RELEASE"
            echo "PBS_PYTHON=$PBS_PYTHON"
            echo "TTMT_LSMINVER=$TTMT_LSMINVER"
          } >> "$GITHUB_ENV"

      - name: Ensure Rosetta 2 (to run the x86_64 toolchain)
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Write build info
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          cat > utils/_build_info.py <<EOF
          BUILD_NUMBER = $BUILD_NUMBER
          BUILD_SHA = "$(git rev-parse --short HEAD)"
          BUILD_DATE = "$(date -u +%Y%m%d)"
          EOF
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Fetch python-build-standalone (both arches)
        run: |
          base="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_RELEASE}"
          mkdir -p pbs/x86 pbs/arm
          curl -sSL "$base/cpython-${PBS_PYTHON}%2B${PBS_RELEASE}-x86_64-apple-darwin-install_only.tar.gz" | tar -xz -C pbs/x86
          curl -sSL "$base/cpython-${PBS_PYTHON}%2B${PBS_RELEASE}-aarch64-apple-darwin-install_only.tar.gz" | tar -xz -C pbs/arm
          {
            echo "PY_X86=$PWD/pbs/x86/python/bin/python3"
            echo "PY_ARM=$PWD/pbs/arm/python/bin/python3"
          } >> "$GITHUB_ENV"

      - name: Build x86_64 slice (under Rosetta)
        env:
          TTMT_VERSION: ${{ inputs.version_label }}
          TTMT_BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          TTMT_BETA: ${{ inputs.beta && '1' || '' }}
        run: |
          arch -x86_64 "$PY_X86" -m pip install --quiet --upgrade pip
          arch -x86_64 "$PY_X86" -m pip install --quiet -r requirements.txt
          arch -x86_64 "$PY_X86" -m PyInstaller --noconfirm --distpath dist_x86 --workpath build_x86 ToonTownMultiTool.spec

      - name: Build arm64 slice (native)
        env:
          TTMT_VERSION: ${{ inputs.version_label }}
          TTMT_BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          TTMT_BETA: ${{ inputs.beta && '1' || '' }}
        run: |
          "$PY_ARM" -m pip install --quiet --upgrade pip
          "$PY_ARM" -m pip install --quiet -r requirements.txt
          "$PY_ARM" -m PyInstaller --noconfirm --distpath dist_arm --workpath build_arm ToonTownMultiTool.spec

      - name: Merge to universal2 (mutate bundle BEFORE signing)
        run: |
          APP_NAME="$(basename "$(ls -d dist_arm/*.app)")"
          bash packaging/macos/lipo_merge.sh "dist_arm/$APP_NAME" "dist_x86/$APP_NAME" "dist/$APP_NAME"
          # Every bundle mutation MUST happen here, BEFORE signing. The beta
          # sentinel sits next to the executable so build_flavor finds it next
          # to sys.executable in the packaged app at runtime.
          if [ "${{ inputs.beta }}" = "true" ]; then
            touch "dist/$APP_NAME/Contents/MacOS/.beta_flavor"
          fi

      - name: Verify universal (fat-Mach-O gate)
        run: bash packaging/macos/verify_universal.sh "dist/$(basename "$(ls -d dist/*.app)")"

      - name: Sign (ad-hoc hardened runtime)
        run: bash packaging/macos/sign.sh "dist/$(basename "$(ls -d dist/*.app)")"

      - name: Build DMG
        run: |
          APP="dist/$(basename "$(ls -d dist/*.app)")"
          if [ "${{ inputs.beta }}" = "true" ]; then
            VOL="ToonTown MultiTool Beta"
            OUT="ToonTownMultiTool-Beta-${{ inputs.version_label }}.dmg"
          else
            VOL="ToonTown MultiTool"
            OUT="ToonTownMultiTool-${{ inputs.version_label }}.dmg"
          fi
          bash packaging/macos/build_dmg.sh "$APP" "$OUT" "$VOL"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: ToonTownMultiTool-*.dmg
