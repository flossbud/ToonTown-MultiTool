name: Test Linux

on:
  workflow_call:
    inputs:
      include_flatpak:
        description: Whether to run the Flatpak launch test
        type: boolean
        default: true
      include_aur:
        description: Whether to run the AUR PKGBUILD launch test (release-only)
        type: boolean
        default: false

# Host Qt/GL/xcb runtime stack the app needs on every Linux target. Used by
# the apt-based jobs below. This intentionally duplicates the Depends: list in
# scripts/build-deb.sh and the apt lines in build-linux.yml -- the lists drift
# slowly and test-deb catches any mismatch.
env:
  QT_LIBS: >-
    libglib2.0-0 libgl1 libegl1 libdbus-1-3 libfontconfig1 libfreetype6
    libx11-6 libx11-xcb1 libxext6 libxrender1 libxi6 libsm6 libice6
    libxcb1 libxcb-cursor0 libxcb-glx0 libxcb-icccm4 libxcb-image0
    libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-render0
    libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0
    libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 libxkbcommon-x11-0

jobs:
  test-linux-source:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
          - archlinux:latest
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system + Qt runtime dependencies (apt)
        if: ${{ startsWith(matrix.image, 'debian') || startsWith(matrix.image, 'ubuntu') }}
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y python3 python3-pip python3-venv xvfb $QT_LIBS

      - name: Install system + Qt runtime dependencies (pacman)
        if: ${{ startsWith(matrix.image, 'archlinux') }}
        run: |
          # -Syu (full upgrade), not -Sy: the archlinux:latest image ships an
          # older base set, and `pacman -Sy <pkg>` installs the *latest* pkg
          # against it -- a partial upgrade that breaks sonames (e.g. the new
          # xorg-server-xvfb needing libnettle.so.9 the stale nettle lacks).
          pacman -Syu --noconfirm python python-pip xorg-server-xvfb xorg-fonts-misc \
            glib2 libglvnd dbus fontconfig freetype2 libx11 libxext libxrender \
            libxi libsm libice libxcb xcb-util-cursor xcb-util-image \
            xcb-util-keysyms xcb-util-renderutil xcb-util-wm libxkbcommon \
            libxkbcommon-x11

      - name: Create venv and install Python dependencies
        run: |
          python3 -m venv /tmp/ttmt-venv
          /tmp/ttmt-venv/bin/pip install --upgrade pip
          /tmp/ttmt-venv/bin/pip install -r requirements.txt

      - name: Run self-check under xvfb
        run: xvfb-run -a /tmp/ttmt-venv/bin/python main.py --self-check

  test-appimage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
          - archlinux:latest
          - fedora:latest
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Download the AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Install host Qt runtime libraries (apt)
        if: ${{ startsWith(matrix.image, 'debian') || startsWith(matrix.image, 'ubuntu') }}
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y xvfb $QT_LIBS

      - name: Install host Qt runtime libraries (pacman)
        if: ${{ startsWith(matrix.image, 'archlinux') }}
        run: |
          # -Syu (full upgrade), not -Sy: the archlinux:latest image ships an
          # older base set, and `pacman -Sy <pkg>` installs the *latest* pkg
          # against it -- a partial upgrade that breaks sonames (e.g. the new
          # xorg-server-xvfb needing libnettle.so.9 the stale nettle lacks).
          pacman -Syu --noconfirm xorg-server-xvfb xorg-fonts-misc glib2 libglvnd dbus \
            fontconfig freetype2 libx11 libxext libxrender libxi libsm libice \
            libxcb xcb-util-cursor xcb-util-image xcb-util-keysyms \
            xcb-util-renderutil xcb-util-wm libxkbcommon libxkbcommon-x11

      - name: Install host Qt runtime libraries (dnf)
        if: ${{ startsWith(matrix.image, 'fedora') }}
        run: |
          dnf install -y xorg-x11-server-Xvfb glib2 mesa-libGL mesa-libEGL \
            dbus-libs fontconfig freetype libX11 libX11-xcb libXext libXrender \
            libXi libSM libICE libxcb xcb-util-cursor xcb-util-image \
            xcb-util-keysyms xcb-util-renderutil xcb-util-wm libxkbcommon \
            libxkbcommon-x11

      - name: Run self-check via AppImage (extract-and-run)
        run: |
          chmod +x TTMultiTool-*.AppImage
          # -e /dev/stdout surfaces Xvfb's own stderr into the job log;
          # without it xvfb-run discards it to /dev/null and an Xvfb startup
          # failure shows only as an opaque "could not connect to display".
          xvfb-run -a -e /dev/stdout ./TTMultiTool-*.AppImage --appimage-extract-and-run --self-check

  test-flatpak:
    if: ${{ inputs.include_flatpak }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download the Flatpak bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak

      - name: Install flatpak runtime + bundle
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak xvfb
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.7
          flatpak install --user -y --bundle TTMultiTool-*.flatpak

      - name: Run self-check via Flatpak
        run: |
          xvfb-run -a flatpak run io.github.flossbud.ToonTownMultiTool --self-check

  test-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - ubuntu:22.04
          - ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Download the .deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb

      # Deliberately do NOT pre-install the Qt libraries. Installing only xvfb
      # (the test harness) plus the .deb itself proves that the package's
      # Depends: field is correct and complete -- apt must resolve the full
      # GL/xcb runtime stack on its own.
      - name: Install the .deb (apt resolves Depends)
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y xvfb ./TTMultiTool-*.deb

      - name: Run self-check via the installed .deb
        run: xvfb-run -a toontown-multitool --self-check

  test-keyring:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the Secret Service keyring stack
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring libsecret-1-0 dbus-x11

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run keyring self-check under dbus + gnome-keyring
        run: |
          # `echo ""` (newline-terminated empty password) makes
          # gnome-keyring-daemon --unlock CREATE the login keyring on first
          # run; `echo -n ""` sends bare EOF, read as "no password" — the
          # keyring is never set up and secretstorage falls back to a
          # GUI prompt that cannot run headless ("Prompt dismissed").
          dbus-run-session -- bash -c '
            echo "" | gnome-keyring-daemon --unlock --components=secrets
            python main.py --self-check-keyring
          '

  test-wayland:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Weston + Qt Wayland runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y weston $QT_LIBS

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run self-check under headless Weston
        run: |
          export XDG_RUNTIME_DIR="$(mktemp -d)"
          chmod 700 "$XDG_RUNTIME_DIR"
          weston --backend=headless-backend.so --socket=wayland-ci --idle-time=0 &
          WESTON_PID=$!
          # Poll for Wayland socket readiness instead of a fixed sleep. Cap at 15s.
          for i in $(seq 1 75); do
            if [ -S "${XDG_RUNTIME_DIR}/wayland-ci" ]; then
              break
            fi
            sleep 0.2
          done
          if ! [ -S "${XDG_RUNTIME_DIR}/wayland-ci" ]; then
            echo "Weston failed to create socket within 15s" >&2
            kill "$WESTON_PID" 2>/dev/null || true
            exit 1
          fi
          set +e
          WAYLAND_DISPLAY=wayland-ci QT_QPA_PLATFORM=wayland \
            python main.py --self-check
          STATUS=$?
          set -e
          kill "$WESTON_PID" 2>/dev/null || true
          exit $STATUS

  test-aur:
    if: ${{ inputs.include_aur }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: archlinux:latest
    steps:
      - name: Install base toolchain
        # -Syu (full upgrade), not -Sy: a bare -Sy is a partial upgrade that
        # breaks sonames against the archlinux:latest image's stale base set.
        run: pacman -Syu --noconfirm base-devel git sudo xorg-server-xvfb xorg-fonts-misc

      - name: Create a non-root build user (makepkg refuses to run as root)
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - name: Select the AUR repo by tag
        id: aur
        run: |
          # Beta tags carry a '-suffix' (e.g. v2.3.0-a) -> ttmt-beta.
          # Stable tags (e.g. v2.3.0) -> toontown-multitool.
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "pkg=ttmt-beta" >> "$GITHUB_OUTPUT"
          else
            echo "pkg=toontown-multitool" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone the published AUR PKGBUILD
        run: |
          git clone "https://aur.archlinux.org/${{ steps.aur.outputs.pkg }}.git" /tmp/aur
          chown -R builder /tmp/aur

      # Pre-build AUR-only deps of the target PKGBUILD directly via
      # makepkg, avoiding any AUR helper. Helpers like paru-bin / yay-bin
      # ship pre-built binaries linked against a specific libalpm.so.X and
      # break on archlinux:latest when pacman -Syu pulls a newer libalpm
      # than the helper was built against (we hit
      # "paru: error while loading shared libraries: libalpm.so.15" this way).
      # python-pynput is currently the only AUR-only dep in the published
      # PKGBUILD's depends=(); its own deps are all in extra/core, so plain
      # makepkg -si resolves them cleanly. Update this list if the target
      # PKGBUILD adds further AUR-only deps.
      - name: Pre-install AUR-only deps (direct makepkg, no helper)
        run: |
          for pkg in python-pynput; do
            sudo -u builder git clone "https://aur.archlinux.org/${pkg}.git" "/tmp/${pkg}"
            sudo -u builder bash -c "cd '/tmp/${pkg}' && makepkg -si --noconfirm"
          done

      # Builds the real, already-published PKGBUILD exactly as `yay`/`paru`
      # would. The /release and /pre-release skills are responsible for
      # having pushed the matching pkgver bump BEFORE the git tag was pushed.
      - name: Build and install the AUR package
        run: sudo -u builder bash -c 'cd /tmp/aur && makepkg -si --noconfirm'

      - name: Launch-test the installed AUR package
        run: |
          # The previous awk pattern '/usr/bin/' matched BOTH the directory
          # entry '/usr/bin/' AND the binary '/usr/bin/<pkg>' that pacman -Ql
          # lists. head -1 then picked the directory and xvfb-run died with
          # 'Is a directory'. Require at least one non-slash char after
          # /usr/bin/ and no trailing slash so only the actual executable
          # is picked.
          BIN=$(pacman -Ql "${{ steps.aur.outputs.pkg }}" \
            | awk '$2 ~ /^\/usr\/bin\/[^/]+$/ {print $2}' | head -1)
          [ -n "$BIN" ] || { echo "no /usr/bin entry found for ${{ steps.aur.outputs.pkg }}"; exit 1; }
          xvfb-run -a "$BIN" --self-check
