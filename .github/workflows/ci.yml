name: CI

on:
  workflow_dispatch:
    inputs:
      include_flatpak:
        description: Build and launch-test the Flatpak (slow; uncheck for a faster manual run)
        type: boolean
        default: true
  push:
    branches: [dev, main]

# A new push to a branch cancels its still-running CI -- saves runner minutes
# on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard-attribution:
    # Fail the build if any workflow would commit under a non-human identity,
    # so a bot can never re-enter the Contributors list. Pure stdlib file scan
    # -- no venv, no Qt, runs in seconds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: No bot identities in workflows
        run: python3 tests/test_workflow_git_identity.py

  build-linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      version_label: dev
      include_flatpak: ${{ github.event_name != 'workflow_dispatch' || inputs.include_flatpak }}

  test-linux:
    needs: build-linux
    uses: ./.github/workflows/test-linux.yml
    with:
      include_flatpak: ${{ github.event_name != 'workflow_dispatch' || inputs.include_flatpak }}
      include_aur: false

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    with:
      version_label: dev

  test-windows:
    needs: build-windows
    uses: ./.github/workflows/test-windows.yml

  build-macos:
    uses: ./.github/workflows/build-macos.yml
    with:
      version_label: dev

  test-macos:
    needs: build-macos
    uses: ./.github/workflows/test-macos.yml
