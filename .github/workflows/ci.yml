name: CI

on:
  workflow_dispatch:
    inputs:
      include_flatpak:
        description: Build and launch-test the Flatpak (slow; uncheck for a faster manual run)
        type: boolean
        default: true
  pull_request:
  push:
    branches: [dev, main]

# A new push to a branch cancels its still-running CI -- saves runner minutes
# on rapid pushes. portability.yml did not do this.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      include_windows: true
      # Only a manual run may opt out of Flatpak; push/PR runs always build it.
      include_flatpak: ${{ github.event_name != 'workflow_dispatch' || inputs.include_flatpak }}

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      include_windows: true
      include_aur: false
      include_flatpak: ${{ github.event_name != 'workflow_dispatch' || inputs.include_flatpak }}
