name: CI

on:
  workflow_dispatch:
    inputs:
      include_flatpak:
        description: Build and launch-test the Flatpak (slow; uncheck for a faster manual run)
        type: boolean
        default: true

# A new push to a branch cancels its still-running CI -- saves runner minutes
# on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yml
    with:
      version_label: dev
      include_flatpak: ${{ github.event_name != 'workflow_dispatch' || inputs.include_flatpak }}

  test-linux:
    needs: build-linux
    uses: ./.github/workflows/test-linux.yml
    with:
      include_flatpak: ${{ github.event_name != 'workflow_dispatch' || inputs.include_flatpak }}
      include_aur: false

  build-windows:
    uses: ./.github/workflows/build-windows.yml
    with:
      version_label: dev

  test-windows:
    needs: build-windows
    uses: ./.github/workflows/test-windows.yml
