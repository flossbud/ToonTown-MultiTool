name: Test macOS

on:
  workflow_call:

jobs:
  test-macos:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      # Checkout first: actions/checkout cleans the workspace, so it must run
      # before the artifact download or it would wipe the downloaded DMG.
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'   # the from-source run only needs a 3.12 interpreter;
                                   # the packaged .app carries its own pinned PBS python

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # From-source first (does the code run?), then the packaged .app (does
      # packaging run?) -- this order isolates a code bug from a build bug.
      - name: From-source self-check
        run: TTMT_NO_VENV_REEXEC=1 python main.py --self-check

      - name: Targeted darwin pytest subset
        # The whole tests/ dir hangs (an unrelated CC launch-gate modal exec()
        # plus non-daemon-thread leaks in other suites never let the shared
        # interpreter exit). This curated set is every darwin-specific suite,
        # validated to pass AND to let the interpreter exit cleanly when run as
        # ONE invocation. Add a darwin suite here only after confirming the
        # combined run still exits cleanly (the Click Sync helper suites spawn a
        # /usr/bin/python3 child + shut it down - verified no leak/hang at exit).
        run: |
          TTMT_NO_VENV_REEXEC=1 QT_QPA_PLATFORM=offscreen python -m pytest -q \
            tests/test_macos_backend.py tests/test_macos_backend_mouse.py \
            tests/test_macos_mouse_delivery.py tests/test_macos_mouse_capture.py \
            tests/test_macos_discovery.py tests/test_macos_discovery_clicksync.py \
            tests/test_macos_click_sync_wiring.py \
            tests/test_input_service_darwin.py tests/test_input_service_darwin_lifecycle.py \
            tests/test_macos_keyboard_layout.py tests/test_macos_keycodes.py \
            tests/test_macos_movement_grabber.py tests/test_macos_ttr_ports.py \
            tests/test_game_registry_darwin.py tests/test_hotkey_manager_darwin.py \
            tests/test_window_manager_darwin.py tests/test_keyring_macos_stub.py \
            tests/test_sleep_inhibitor_macos.py tests/test_ttr_launcher_macos.py \
            tests/test_launch_tab_macos_engine.py tests/test_settings_tab_ttr_macos_path.py \
            tests/test_macos_import_safety.py tests/test_build_flavor_macos.py \
            tests/test_macos_permissions.py tests/test_macos_permissions_dialog.py \
            tests/test_macos_native_port_ctypes.py tests/test_macos_platform_binary.py \
            tests/test_macos_engine_gate.py tests/test_macos_clt.py \
            tests/test_macos_inject_helper.py tests/test_macos_inject_remote.py \
            tests/test_macos_inject_remote_rpc.py tests/test_macos_delivery_ready_reasons.py \
            tests/test_macos_overlay_backend.py tests/test_overlay_gestures.py \
            tests/test_win32_overlay_backend.py tests/test_overlay_surface.py \
            tests/test_ghost_renderer.py tests/test_ghost_frame_pacing.py \
            tests/test_click_sync_motion_injector.py tests/test_ghost_occlusion_gate.py \
            tests/test_global_hotkeys_carbon.py tests/test_emblem_pulse_gate.py \
            tests/test_cluster_topology_reclamp.py \
            tests/test_chord_capture_session.py \
            tests/test_pinch_zoom_machine.py tests/test_pinch_zoom_coordinator.py \
            tests/test_cluster_scale_gesture.py

      - name: Download DMG
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: dmg-in

      - name: Packaged .app self-check (cocoa, hardened runtime)
        run: |
          # Mount the DMG and run the bundled binary's --self-check from the
          # read-only volume. --self-check builds the full window but never
          # .show()s it, so the onboarding (which fires post-show) never
          # triggers and no TCC prompt appears; it also runs on the real cocoa
          # plugin (not offscreen) so it cannot hit the winId->objc segv class.
          # Direct exec from the mount avoids the GUI translocation gate. This
          # is the authoritative hardened-runtime LOADING test (codesign
          # --verify only proves the signature, not that it loads).
          #
          # On a SUCCESSFUL frozen macOS build the binary os._exit(0)s right after
          # "self-check OK" (main.py _self_check_exit), skipping a rare CI-only
          # native finalization crash that used to fail the gate AFTER success; a
          # real load error still exits non-zero. The status-capture wrapper keeps
          # hdiutil detach running and stages diagnostics even on a non-zero exit;
          # the two steps below preserve faulthandler.log + macOS crash reports for
          # any future load-time failure.
          DMG=$(ls dmg-in/ToonTownMultiTool-*.dmg | head -1)
          hdiutil attach "$DMG" -mountpoint /tmp/ttmt_dmg -nobrowse
          APP=$(ls -d /tmp/ttmt_dmg/*.app | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP"
          DIAG="$RUNNER_TEMP/selfcheck-diag"; mkdir -p "$DIAG"
          export XDG_CACHE_HOME="$RUNNER_TEMP/cache"; mkdir -p "$XDG_CACHE_HOME"
          set +e
          TTMT_NO_VENV_REEXEC=1 "$APP/Contents/MacOS/ToonTownMultiTool" --self-check
          code=$?
          set -e
          echo "self-check exit=$code" | tee "$DIAG/exit_codes.txt"
          cp -f "$XDG_CACHE_HOME/toontown-multitool/faulthandler.log" "$DIAG/faulthandler.log" 2>/dev/null || true
          hdiutil detach /tmp/ttmt_dmg || true
          exit $code

      - name: Collect self-check crash diagnostics
        if: always()
        run: |
          DIAG="$RUNNER_TEMP/selfcheck-diag"
          mkdir -p "$DIAG/DiagnosticReports"
          sleep 8   # let ReportCrash flush any crash report to disk
          for d in "$HOME/Library/Logs/DiagnosticReports" "/Library/Logs/DiagnosticReports"; do
            [ -d "$d" ] || continue
            cp -f "$d"/*[Tt]oon[Tt]own* "$DIAG/DiagnosticReports/" 2>/dev/null || true
            cp -f "$d"/Python* "$DIAG/DiagnosticReports/" 2>/dev/null || true
            { echo "--- $d ---"; ls -lt "$d" 2>/dev/null | head -30; } >> "$DIAG/DiagnosticReports/listing.txt" || true
          done
          echo "=== captured faulthandler logs ==="
          for f in "$DIAG"/faulthandler*.log; do echo "--- $f ---"; cat "$f" 2>/dev/null || true; done
          echo "=== crash reports captured ==="; ls -la "$DIAG/DiagnosticReports/" 2>/dev/null || true

      - name: Upload self-check diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-selfcheck-diag
          path: ${{ runner.temp }}/selfcheck-diag
          if-no-files-found: warn
