name: Test macOS

on:
  workflow_call:

jobs:
  test-macos:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      # Checkout first: actions/checkout cleans the workspace, so it must run
      # before the artifact download or it would wipe the downloaded DMG.
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'   # the from-source run only needs a 3.12 interpreter;
                                   # the packaged .app carries its own pinned PBS python

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # From-source first (does the code run?), then the packaged .app (does
      # packaging run?) -- this order isolates a code bug from a build bug.
      - name: From-source self-check
        run: TTMT_NO_VENV_REEXEC=1 python main.py --self-check

      - name: Targeted darwin pytest subset
        # The whole tests/ dir hangs (an unrelated CC launch-gate modal exec()
        # plus non-daemon-thread leaks in other suites never let the shared
        # interpreter exit). This curated set is every darwin-specific suite,
        # validated to pass AND to let the interpreter exit cleanly when run as
        # ONE invocation (248 passed, 1 skipped locally). Add a darwin suite
        # here only after confirming the combined run still exits cleanly.
        run: |
          TTMT_NO_VENV_REEXEC=1 QT_QPA_PLATFORM=offscreen python -m pytest -q \
            tests/test_macos_backend.py tests/test_macos_backend_mouse.py \
            tests/test_macos_mouse_delivery.py tests/test_macos_mouse_capture.py \
            tests/test_macos_discovery.py tests/test_macos_discovery_clicksync.py \
            tests/test_macos_click_sync_wiring.py \
            tests/test_input_service_darwin.py tests/test_input_service_darwin_lifecycle.py \
            tests/test_macos_keyboard_layout.py tests/test_macos_keycodes.py \
            tests/test_macos_movement_grabber.py tests/test_macos_ttr_ports.py \
            tests/test_game_registry_darwin.py tests/test_hotkey_manager_darwin.py \
            tests/test_window_manager_darwin.py tests/test_keyring_macos_stub.py \
            tests/test_sleep_inhibitor_macos.py tests/test_ttr_launcher_macos.py \
            tests/test_launch_tab_macos_engine.py tests/test_settings_tab_ttr_macos_path.py \
            tests/test_macos_import_safety.py tests/test_build_flavor_macos.py \
            tests/test_macos_permissions.py tests/test_macos_permissions_dialog.py

      - name: Download DMG
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: dmg-in

      - name: Packaged .app self-check (cocoa, hardened runtime)
        run: |
          # Mount the DMG and run the bundled binary's --self-check from the
          # read-only volume. --self-check builds the full window but never
          # .show()s it, so the onboarding (which fires post-show) never
          # triggers and no TCC prompt appears; it also runs on the real cocoa
          # plugin (not offscreen) so it cannot hit the winId->objc segv class.
          # Direct exec from the mount avoids the GUI translocation gate. This
          # is the authoritative hardened-runtime LOADING test (codesign
          # --verify only proves the signature, not that it loads).
          DMG=$(ls dmg-in/ToonTownMultiTool-*.dmg | head -1)
          hdiutil attach "$DMG" -mountpoint /tmp/ttmt_dmg -nobrowse
          APP=$(ls -d /tmp/ttmt_dmg/*.app | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP"
          TTMT_NO_VENV_REEXEC=1 "$APP/Contents/MacOS/ToonTownMultiTool" --self-check
          hdiutil detach /tmp/ttmt_dmg
