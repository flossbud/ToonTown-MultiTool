name: Build

on:
  workflow_call:
    inputs:
      include_windows:
        description: Whether to run the Windows EXE build
        type: boolean
        default: true
      include_flatpak:
        description: Whether to build the Flatpak bundle
        type: boolean
        default: true
      version_label:
        description: Label embedded in artifact filenames (e.g. a release tag). Must not contain '/'.
        type: string
        default: dev

jobs:
  build-windows:
    runs-on: windows-latest
    if: ${{ inputs.include_windows }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Package onedir as zip
        shell: pwsh
        run: |
          $tag = "${{ inputs.version_label }}"
          Compress-Archive -Path "dist\ToonTownMultiTool\*" -DestinationPath "ToonTownMultiTool-$tag-Windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ToonTownMultiTool-*.zip

  build-linux:
    # Build inside ubuntu:20.04 (glibc 2.31, same as the previous debian:11)
    # so the .deb continues to install on every currently-supported Mint /
    # Debian / Ubuntu release. Python 3.12 comes from the deadsnakes PPA;
    # deadsnakes builds CPython with --enable-shared, which PyInstaller
    # requires (manylinux containers static-link Python and don't work
    # here). 3.12 in turn supports PEP 604 (X | None) and other 3.10+
    # syntax used in the codebase. The full Qt runtime lib set is
    # installed so PyInstaller bundles libEGL.so.1 & friends.
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - name: Install Python 3.12 and Qt runtime libraries
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y software-properties-common gpg-agent
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y \
            python3.12 python3.12-dev python3.12-venv \
            git wget file binutils xz-utils ca-certificates \
            libglib2.0-0 libgl1 libegl1 libopengl0 libdbus-1-3 \
            libfontconfig1 libfreetype6 \
            libx11-6 libx11-xcb1 libxext6 libxrender1 libxi6 libsm6 libice6 \
            libxcb1 libxcb-cursor0 libxcb-glx0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-render0 \
            libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon0 libxkbcommon-x11-0

      - uses: actions/checkout@v4

      - name: Build PyInstaller binary in a venv
        run: |
          python3.12 -m venv /tmp/build-venv
          /tmp/build-venv/bin/pip install --upgrade pip
          /tmp/build-venv/bin/pip install -r requirements.txt pyinstaller
          /tmp/build-venv/bin/pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Upload raw Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/ToonTownMultiTool

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/ToonTownMultiTool AppDir/usr/bin/ToonTownMultiTool
          chmod +x AppDir/usr/bin/ToonTownMultiTool

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir \
            TTMultiTool-${{ inputs.version_label }}-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: TTMultiTool-*.AppImage

  build-flatpak:
    if: ${{ inputs.include_flatpak }}
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: TTMultiTool-${{ inputs.version_label }}-Linux-x86_64.flatpak
          manifest-path: flatpak/io.github.flossbud.ToonTownMultiTool.yml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/*.yml') }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: TTMultiTool-*.flatpak

  build-deb:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download the raw Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: dist

      - name: Build .deb
        run: |
          chmod +x dist/ToonTownMultiTool
          bash scripts/build-deb.sh dist/ToonTownMultiTool "${{ inputs.version_label }}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: TTMultiTool-*.deb
