name: Build

on:
  workflow_call:
    inputs:
      include_windows:
        description: Whether to run the Windows EXE build
        type: boolean
        default: true
      include_flatpak:
        description: Whether to build the Flatpak bundle
        type: boolean
        default: true
      version_label:
        description: Label embedded in artifact filenames (e.g. a release tag). Must not contain '/'.
        type: string
        default: dev

jobs:
  build-windows:
    runs-on: windows-latest
    if: ${{ inputs.include_windows }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Package onedir as zip
        shell: pwsh
        run: |
          $tag = "${{ inputs.version_label }}"
          Compress-Archive -Path "dist\ToonTownMultiTool\*" -DestinationPath "ToonTownMultiTool-$tag-Windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ToonTownMultiTool-*.zip

  build-linux:
    # Build inside manylinux_2_28 (glibc 2.28) so the AppImage runs on every
    # currently-supported Debian/Ubuntu/Mint release AND every newer distro.
    # The container ships every CPython 3.6–3.13 prebuilt under
    # /opt/python/cpXY-cpXY/; we use cp312 so the bundled interpreter
    # supports PEP 604 (X | None) and other 3.10+ syntax used in the
    # codebase. The full Qt runtime lib set is installed so PyInstaller
    # bundles libEGL.so.1 & friends.
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Install Qt runtime libraries
        run: |
          dnf install -y \
            glib2 dbus-libs \
            mesa-libGL mesa-libEGL \
            fontconfig freetype \
            libX11 libX11-xcb libXext libXrender libXi libSM libICE \
            libxcb xcb-util xcb-util-cursor xcb-util-image xcb-util-keysyms \
            xcb-util-renderutil xcb-util-wm \
            libxkbcommon libxkbcommon-x11

      - uses: actions/checkout@v4

      - name: Build PyInstaller binary in a venv
        run: |
          /opt/python/cp312-cp312/bin/python3 -m venv /tmp/build-venv
          /tmp/build-venv/bin/pip install --upgrade pip
          /tmp/build-venv/bin/pip install -r requirements.txt pyinstaller
          /tmp/build-venv/bin/pyinstaller --noconfirm ToonTownMultiTool.spec

      - name: Upload raw Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/ToonTownMultiTool

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/ToonTownMultiTool AppDir/usr/bin/ToonTownMultiTool
          chmod +x AppDir/usr/bin/ToonTownMultiTool

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir \
            TTMultiTool-${{ inputs.version_label }}-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: TTMultiTool-*.AppImage

  build-flatpak:
    if: ${{ inputs.include_flatpak }}
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: TTMultiTool-${{ inputs.version_label }}-Linux-x86_64.flatpak
          manifest-path: flatpak/io.github.flossbud.ToonTownMultiTool.yml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/*.yml') }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: TTMultiTool-*.flatpak

  build-deb:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download the raw Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: dist

      - name: Build .deb
        run: |
          chmod +x dist/ToonTownMultiTool
          bash scripts/build-deb.sh dist/ToonTownMultiTool "${{ inputs.version_label }}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: TTMultiTool-*.deb
