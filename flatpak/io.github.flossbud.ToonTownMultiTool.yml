app-id: io.github.flossbud.ToonTownMultiTool
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: toontown-multitool

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=session-bus
  - --device=dri
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home
  - --filesystem=xdg-config/toontown_multitool:create
  - --env=PYTHONPATH=/app/lib/toontown-multitool

modules:
  - name: xdotool
    buildsystem: simple
    build-commands:
      - make PREFIX=/app
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/jordansissel/xdotool/releases/download/v3.20211022.1/xdotool-3.20211022.1.tar.gz
        sha256: 96f0facfde6d78eacad35b91b0f46fecd0b35e474c03e00e30da3fdd345f9ada

  - name: python-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: '1'
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation
        "PySide6>=6.5" pynput requests "keyring>=24" certifi cryptography
        secretstorage jeepney python-xlib

  - name: toontown-multitool
    buildsystem: simple
    build-commands:
      - install -d /app/lib/toontown-multitool
      - cp -r main.py tabs services utils /app/lib/toontown-multitool/
      - install -Dm755 flatpak/launcher.sh /app/bin/toontown-multitool
      - install -Dm644 flatpak/io.github.flossbud.ToonTownMultiTool.desktop
        /app/share/applications/io.github.flossbud.ToonTownMultiTool.desktop
      - install -Dm644 flatpak/io.github.flossbud.ToonTownMultiTool.metainfo.xml
        /app/share/metainfo/io.github.flossbud.ToonTownMultiTool.metainfo.xml
      - install -Dm644 flatpak/icon-512.png
        /app/share/icons/hicolor/512x512/apps/io.github.flossbud.ToonTownMultiTool.png
    sources:
      - type: dir
        path: ..
